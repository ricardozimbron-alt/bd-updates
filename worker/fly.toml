# fly.toml — BD updates worker
# The Dockerfile lives at the repo root because it COPYs files from
# ../prisma, ../lib, ../worker. Build context must be the repo root.
# Deploy from the repo root with:
#   flyctl deploy --config worker/fly.toml --remote-only

app = "bd-updates-worker"
primary_region = "lhr"

[build]
  dockerfile = "../Dockerfile"
  ignorefile = "../.dockerignore"

[env]
  NODE_ENV = "production"
  WORKER_HEALTH_PORT = "8080"
  WORKSPACE_ID = "default-workspace"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "1024mb"

[[restart]]
  policy = "always"
